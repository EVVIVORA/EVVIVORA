<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVVIVORA</title>
    <style>
        /* Das Design-Grundgerüst */
        body {
            background-color: #000000; /* Tiefschwarzer Hintergrund */
            color: #ffffff;           /* Reinweiße Schrift */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Styling für deine Überschrift */
        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Styling für den Untertext */
        p {
            font-size: 1.2rem;
            color: #cccccc; /* Leichtes Grau für edlen Kontrast */
            margin-bottom: 30px;
        }

        /* Styling für deine Buttons / Links */
        .link-button {
            display: inline-block;
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff; /* Weißer Rahmen */
            padding: 12px 30px;
            font-size: 1rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        /* Effekt, wenn man mit der Maus über den Button fährt */
        .link-button:hover {
            background-color: #ffffff;
            color: #000000; /* Invertiert die Farben beim Drüberfahren */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>EVVIVORA</h1>
    <p>Music / Synthwave</p>

    https://www.youtube.com/@evvivora
    <a href="HIER_DEIN_YOUTUBE_LINK" class="link-button" target="_blank">Listen on YouTube</a>

</body>
</html>
